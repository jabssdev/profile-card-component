<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Profile card component for Victor Crest" />

		<link rel="shortcut icon" href="./images/favicon-32x32.png" type="image/png" sizes="32x32" />
		<link rel="preload" href="fonts/KumbhSans-VariableFont_YOPQ,wght.ttf" as="font" type="font/ttf" crossorigin="anonymous" />
		<link rel="stylesheet" href="styles.css" />
		<title>Profile card component | Frontend Mentor</title>
	</head>
	<body>
		<main class="card">
			<header class="card__header">
				<img src="./images/bg-pattern-card.svg" alt="" class="card__bg-pattern" aria-hidden="true" />
				<div class="card__avatar-wrapper">
					<img src="./images/image-victor.jpg" alt="Victor Crest" class="card__avatar" />
				</div>
			</header>

			<!-- User information section -->
			<section class="card__info">
				<div class="card__user">
					<h1 class="card__name">
						Victor Crest
						<span class="card__age">26</span>
					</h1>
					<p class="card__location">London</p>
				</div>
			</section>

			<!-- Divider -->
			<hr class="card__divider" />

			<!-- Statistics section -->
			<section class="card__stats" aria-label="User statistics">
				<div class="card__stat">
					<strong class="card__stat-value">80K</strong>
					<span class="card__stat-label">Followers</span>
				</div>
				<div class="card__stat">
					<strong class="card__stat-value">803K</strong>
					<span class="card__stat-label">Likes</span>
				</div>
				<div class="card__stat">
					<strong class="card__stat-value">1.4K</strong>
					<span class="card__stat-label">Photos</span>
				</div>
			</section>
		</main>

		<!-- Attribution -->
		<footer class="attribution">
			Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. Coded by <a href="https://github.com/jabssdev" target="_blank">JabssDev</a>.
		</footer>
	</body>
</html>
